apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-accessories
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Filesystem
  {{ if .Values.persist.accessories.storageClassName -}}
  storageClassName: {{ .Values.persist.accessories.storageClassName }}
  {{- end }}
  resources:
    requests:
      storage: 300Mi